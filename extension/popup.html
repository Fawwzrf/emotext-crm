<!DOCTYPE html>
<html>
<head>
    <title>Emotext-CRM Login</title>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #25D366;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 12px;
            color: #666;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #25D366;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #128C7E;
        }
        #status {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            height: 15px;
        }
        .success { color: #25D366; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">EmoText CRM</div>
        <div class="subtitle">AI-Powered WA Intelligence</div>
    </div>
    
    <div class="form-group">
        <label for="apiKey">Company API Key</label>
        <input type="password" id="apiKey" placeholder="Paste your API key here...">
    </div>
    
    <button id="saveBtn">Save & Authenticate</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
